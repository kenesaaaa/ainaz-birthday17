<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Айназ үшін 💖</title>
<style>
    body { margin: 0; background: black; overflow: hidden; color: white; font-family: 'Arial', sans-serif; }
    #text { position: absolute; width: 100%; top: 15%; text-align: center; opacity: 0; transition: 3s ease-in-out; z-index: 10; pointer-events: none; }
    h1 { font-size: 6vw; text-shadow: 0 0 20px #f73487, 0 0 40px #f73487; }
    p { font-size: 2.5vw; letter-spacing: 5px; color: rgba(255,255,255,0.7); }
    
    /* Фотоның стилі */
    #photo-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 300px; /* Фотоның өлшемі */
        height: 300px;
        border-radius: 50%; /* Домалақ қылу */
        border: 5px solid #f73487; /* Рамка */
        overflow: hidden;
        opacity: 0; /* Басында көрінбейді */
        transition: opacity 3s ease-in-out, box-shadow 3s ease-in-out;
        z-index: 5;
        box-shadow: 0 0 50px #f73487; /* Жарқырау */
    }
    #photo-container img {
        width: 100%;
        height: 100%;
        object-fit: cover; /* Фотоны сийдыру */
    }

    /* Анимацияның faded стилі */
    .faded { opacity: 0.3 !important; transition: 3s; }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="photo-container">
    <img src="ainaz.jpg" alt="Айназ"> </div>

<div id="text">
    <h1 id="msg"></h1>
    <p>22.04.2026</p>
</div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

let stage = 0; 
let particles = [];
let progress = 0;

function heart(t){
    return { x:16*Math.pow(Math.sin(t),3), y:-(13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t)) };
}

for(let i=0; i<600; i++){
    let t = Math.random() * Math.PI * 2;
    let h = heart(t);
    particles.push({
        tx: canvas.width/2 + h.x*15,
        ty: canvas.height/2 + h.y*15,
        x: Math.random()*canvas.width, y: Math.random()*canvas.height,
        size: Math.random()*2+1,
        color: "#f73487"
    });
}

function typeText(){
    let text = "Happy Birthday, Айназ 💖";
    let index = 0;
    let el = document.getElementById("msg");
    function write(){
        if(index < text.length){
            el.innerHTML += text[index];
            index++;
            setTimeout(write, 80);
        }
    }
    write();
}

function drawTurtleLines(){
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0,0, canvas.width, canvas.height);
    for(let j=0; j<5; j++){
        let t = Math.random() * Math.PI * 2;
        let h = heart(t);
        ctx.beginPath();
        ctx.moveTo(canvas.width/2, canvas.height/2);
        ctx.lineTo(canvas.width/2 + h.x*15, canvas.height/2 + h.y*15);
        ctx.strokeStyle = "#f73487";
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function animate(){
    if(stage === 0) {
        ctx.fillStyle = "rgba(0,0,0,0.15)";
        ctx.fillRect(0,0, canvas.width, canvas.height);
        particles.forEach(p=>{
            p.x += (p.tx - p.x)*0.02;
            p.y += (p.ty - p.y)*0.02;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.fill();
        });

        progress++;
        if(progress === 180){
            document.getElementById("text").style.opacity = 1;
            typeText();
            // Жазу шыққаннан кейін 3 секундтан кейін фото пайда болады
            setTimeout(() => { 
                stage = 1; 
                document.getElementById("text").classList.add("faded");
                document.getElementById("photo-container").style.opacity = 1;
            }, 3000);
        }
    } else {
        drawTurtleLines();
    }
    requestAnimationFrame(animate);
}

animate();

window.onresize = () => { canvas.width = innerWidth; canvas.height = innerHeight; };
</script>
</body>
</html>
